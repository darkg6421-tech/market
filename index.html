<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Tech Wealth Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ULTRA PREMIUM DARK THEME --- */
        :root {
            --neon-green: #00fa9a;
            --neon-blue: #00d2ff;
            --bg-dark: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #162032 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calc-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Toggles */
        .toggle-box {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 30px;
            grid-column: 1 / -1;
            width: fit-content;
            margin-inline: auto;
            border: 1px solid var(--glass-border);
        }

        .toggle-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .toggle-btn.active {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
            color: #000;
            box-shadow: 0 0 15px rgba(0, 250, 154, 0.4);
        }

        /* Input Controls */
        .input-group {
            margin-bottom: 25px;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .value-display {
            color: var(--neon-green);
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0, 250, 154, 0.1);
            padding: 2px 10px;
            border-radius: 6px;
        }

        /* High-Tech Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Results & Chart Area */
        .results-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
        }

        .chart-container {
            width: 250px;
            height: 250px;
            margin-bottom: 20px;
        }

        .data-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1.1rem;
        }

        .data-row:last-child {
            border-bottom: none;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .calc-container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="calc-container">
        <div class="header">
            <h1>Apex Wealth Engine</h1>
        </div>

        <div class="toggle-box">
            <button class="toggle-btn active" id="btnSip" onclick="setMode('SIP')">SIP</button>
            <button class="toggle-btn" id="btnLump" onclick="setMode('Lumpsum')">Lumpsum</button>
        </div>

        <div class="inputs-section">
            <div class="input-group">
                <div class="input-header">
                    <span id="amountLabel">Monthly Investment</span>
                    <span class="value-display">₹ <span id="valAmount">10000</span></span>
                </div>
                <input type="range" id="sliderAmount" min="500" max="1000000" step="500" value="10000" oninput="calculate()">
            </div>

            <div class="input-group">
                <div class="input-header">
                    <span>Expected Return Rate (p.a)</span>
                    <span class="value-display"><span id="valRate">12</span> %</span>
                </div>
                <input type="range" id="sliderRate" min="1" max="30" step="0.5" value="12" oninput="calculate()">
            </div>

            <div class="input-group">
                <div class="input-header">
                    <span>Time Period</span>
                    <span class="value-display"><span id="valYears">10</span> Years</span>
                </div>
                <input type="range" id="sliderYears" min="1" max="40" step="1" value="10" oninput="calculate()">
            </div>
        </div>

        <div class="results-section">
            <div class="chart-container">
                <canvas id="wealthChart"></canvas>
            </div>
            <div class="data-row">
                <span class="text-muted">Invested Amount</span>
                <span>₹ <span id="resInvested">0</span></span>
            </div>
            <div class="data-row">
                <span class="text-muted">Est. Returns</span>
                <span>₹ <span id="resReturns">0</span></span>
            </div>
            <div class="data-row">
                <span>Total Value</span>
                <span>₹ <span id="resTotal">0</span></span>
            </div>
        </div>
    </div>

    <script>
        let mode = 'SIP';
        let wealthChart;

        // Initialize Chart.js
        const ctx = document.getElementById('wealthChart').getContext('2d');
        wealthChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Invested Amount', 'Est. Returns'],
                datasets: [{
                    data: [50, 50],
                    backgroundColor: ['#00d2ff', '#00fa9a'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '75%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: '#00fa9a',
                        borderWidth: 1
                    }
                }
            }
        });

        // Toggle Mode logic
        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btnSip').classList.remove('active');
            document.getElementById('btnLump').classList.remove('active');
            
            if(mode === 'SIP') {
                document.getElementById('btnSip').classList.add('active');
                document.getElementById('amountLabel').innerText = "Monthly Investment";
                document.getElementById('sliderAmount').max = 500000;
            } else {
                document.getElementById('btnLump').classList.add('active');
                document.getElementById('amountLabel').innerText = "Total Investment";
                document.getElementById('sliderAmount').max = 10000000; // 1 Crore max for slider
            }
            calculate();
        }

        // Core Calculation Engine
        function calculate() {
            // Get slider values
            let P = parseFloat(document.getElementById('sliderAmount').value);
            let r = parseFloat(document.getElementById('sliderRate').value);
            let t = parseFloat(document.getElementById('sliderYears').value);

            // Update display text for inputs
            document.getElementById('valAmount').innerText = P.toLocaleString('en-IN');
            document.getElementById('valRate').innerText = r;
            document.getElementById('valYears').innerText = t;

            let investedAmount = 0;
            let maturityAmount = 0;

            if (mode === 'SIP') {
                // SIP Formula: M = P × ({[1 + i]^n - 1} / i) × (1 + i)
                let i = (r / 100) / 12; // monthly rate
                let n = t * 12; // total months
                investedAmount = P * n;
                maturityAmount = P * ((Math.pow(1 + i, n) - 1) / i) * (1 + i);
            } else {
                // Lumpsum Formula: M = P × (1 + r/100)^t
                investedAmount = P;
                maturityAmount = P * Math.pow(1 + (r / 100), t);
            }

            let estReturns = maturityAmount - investedAmount;

            // Update Results Text (Indian Rupee Format)
            document.getElementById('resInvested').innerText = Math.round(investedAmount).toLocaleString('en-IN');
            document.getElementById('resReturns').innerText = Math.round(estReturns).toLocaleString('en-IN');
            document.getElementById('resTotal').innerText = Math.round(maturityAmount).toLocaleString('en-IN');

            // Update High-Tech Chart
            wealthChart.data.datasets[0].data = [investedAmount, estReturns];
            wealthChart.update();
        }

        // Run calculation once on load
        calculate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Wealth Engine PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#0b0f19;
    color:white;
}

.container {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
    color:#00fa9a;
}

input, button {
    margin:5px 0;
    padding:8px;
    width:100%;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card {
    background:#111827;
    padding:15px;
    border-radius:10px;
}

.client-list {
    max-height:150px;
    overflow:auto;
}

.client-item {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>Apex Wealth Engine PRO MAX</h1>

<div class="grid">

<div class="card">
<h3>Inputs</h3>

<label>Mode</label>
<select id="mode">
<option value="SIP">SIP</option>
<option value="Lump">Lumpsum</option>
</select>

<label>Amount</label>
<input type="number" id="amount" value="10000">

<label>Return %</label>
<input type="number" id="rate" value="12">

<label>Years</label>
<input type="number" id="years" value="10">

<label>Inflation %</label>
<input type="number" id="inflation" value="6">

<label>Step-up %</label>
<input type="number" id="stepup" value="10">

<label>Target (₹)</label>
<input type="number" id="target" value="10000000">

<button onclick="calculate()">Calculate</button>

</div>

<div class="card">
<h3>Results</h3>

<p>Invested: ₹ <span id="invested"></span></p>
<p>Returns: ₹ <span id="returns"></span></p>
<p>Total: ₹ <span id="total"></span></p>
<p id="goalMsg"></p>

<canvas id="chart"></canvas>

</div>

</div>

<div class="card">
<h3>Client Manager</h3>

<input type="text" id="clientName" placeholder="Client Name">
<button onclick="saveClient()">Save Client</button>

<div class="client-list" id="clientList"></div>

</div>

</div>

<script>

let chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: { labels: [], datasets: [{ label: "Growth", data: [] }] }
});

function calculate() {

    let P = +amount.value;
    let r = +rate.value;
    let t = +years.value;
    let inflation = +inflation.value;
    let stepup = +stepup.value;
    let mode = document.getElementById("mode").value;
    let target = +target.value;

    let realR = ((1 + r/100) / (1 + inflation/100)) - 1;
    let i = realR / 12;

    let total = 0;
    let invested = 0;
    let yearly = [];

    if(mode === "SIP") {

        let yearlyP = P;

        for(let y=1; y<=t; y++) {

            let yearTotal = 0;

            for(let m=1; m<=12; m++) {
                yearTotal = (yearTotal + yearlyP) * (1 + i);
            }

            total += yearTotal;
            invested += yearlyP * 12;
            yearly.push(Math.round(total));

            yearlyP *= (1 + stepup/100);
        }

    } else {

        total = P * Math.pow(1 + realR, t);
        invested = P;

        for(let y=1; y<=t; y++) {
            yearly.push(Math.round(P * Math.pow(1 + realR, y)));
        }
    }

    let returns = total - invested;

    document.getElementById("invested").innerText = invested.toLocaleString('en-IN');
    document.getElementById("returns").innerText = returns.toLocaleString('en-IN');
    document.getElementById("total").innerText = total.toLocaleString('en-IN');

    let msg = document.getElementById("goalMsg");

    if(total >= target) {
        msg.innerText = "🔥 Target Achieved!";
    } else {
        msg.innerText = "You need more investment.";
    }

    chart.data.labels = yearly.map((_,i)=>"Y"+(i+1));
    chart.data.datasets[0].data = yearly;
    chart.update();
}

function saveClient() {

    let name = document.getElementById("clientName").value;

    if(!name) return;

    let data = {
        name,
        amount: amount.value,
        rate: rate.value,
        years: years.value
    };

    let clients = JSON.parse(localStorage.getItem("clients") || "[]");
    clients.push(data);

    localStorage.setItem("clients", JSON.stringify(clients));

    loadClients();
}

function loadClients() {

    let list = document.getElementById("clientList");
    list.innerHTML = "";

    let clients = JSON.parse(localStorage.getItem("clients") || "[]");

    clients.forEach((c,i)=>{

        let div = document.createElement("div");
        div.className="client-item";

        div.innerHTML = `
        <span>${c.name}</span>
        <button onclick="loadClient(${i})">Load</button>
        `;

        list.appendChild(div);
    });
}

function loadClient(i) {

    let clients = JSON.parse(localStorage.getItem("clients"));

    let c = clients[i];

    amount.value = c.amount;
    rate.value = c.rate;
    years.value = c.years;

    calculate();
}

loadClients();
calculate();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Wealth Engine PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --neon-green: #00fa9a;
    --neon-blue: #00d2ff;
    --bg-dark: #0b0f19;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-muted: #8b949e;
}

body {
    margin: 0;
    font-family: system-ui;
    background: radial-gradient(circle at top right, #162032 0%, var(--bg-dark) 100%);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.calc-container {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    max-width: 900px;
    width: 100%;
}

h1 {
    text-align: center;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-group { margin: 20px 0; }

.value-display {
    color: var(--neon-green);
}

.extra-options {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    flex-wrap: wrap;
}

.badge {
    margin-top: 15px;
    text-align: center;
    font-size: 1.2rem;
    color: gold;
}

</style>
</head>

<body>

<div class="calc-container">
<h1>Apex Wealth Engine PRO</h1>

<div class="input-group">
<label>Amount ₹ <span id="valAmount" class="value-display"></span></label>
<input type="range" id="amount" min="500" max="100000" value="10000">
</div>

<div class="input-group">
<label>Return % <span id="valRate" class="value-display"></span></label>
<input type="range" id="rate" min="1" max="30" value="12">
</div>

<div class="input-group">
<label>Years <span id="valYears" class="value-display"></span></label>
<input type="range" id="years" min="1" max="40" value="10">
</div>

<div class="extra-options">
<label>Inflation % <input type="number" id="inflation" value="6"></label>
<label>Step-Up % <input type="number" id="stepup" value="10"></label>
</div>

<canvas id="chart"></canvas>

<div class="badge" id="goalText"></div>

<p>Invested: ₹ <span id="invested"></span></p>
<p>Returns: ₹ <span id="returns"></span></p>
<p>Total: ₹ <span id="total"></span></p>

</div>

<script>

let chart;
let timeout;

const ctx = document.getElementById("chart").getContext("2d");

chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Growth",
            data: []
        }]
    }
});

function debounceCalc() {
    clearTimeout(timeout);
    timeout = setTimeout(calculate, 100);
}

document.querySelectorAll("input").forEach(el => {
    el.addEventListener("input", debounceCalc);
});

function calculate() {

    let P = +amount.value;
    let r = +rate.value;
    let t = +years.value;
    let inflation = +document.getElementById("inflation").value;
    let stepup = +document.getElementById("stepup").value;

    valAmount.innerText = P;
    valRate.innerText = r;
    valYears.innerText = t;

    // REAL RETURN
    let realR = ((1 + r/100) / (1 + inflation/100)) - 1;
    let i = realR / 12;

    let total = 0;
    let invested = 0;
    let yearlyData = [];

    let yearlyP = P;

    for (let year = 1; year <= t; year++) {

        let yearTotal = 0;

        for (let m = 1; m <= 12; m++) {
            yearTotal = (yearTotal + yearlyP) * (1 + i);
        }

        total += yearTotal;
        invested += yearlyP * 12;
        yearlyData.push(Math.round(total));

        yearlyP *= (1 + stepup / 100);
    }

    let returns = total - invested;

    investedEl = document.getElementById("invested");
    returnsEl = document.getElementById("returns");
    totalEl = document.getElementById("total");

    investedEl.innerText = Math.round(invested).toLocaleString('en-IN');
    returnsEl.innerText = Math.round(returns).toLocaleString('en-IN');
    totalEl.innerText = Math.round(total).toLocaleString('en-IN');

    // CROREPATI CHECK
    let goalText = document.getElementById("goalText");
    if (total >= 10000000) {
        goalText.innerText = "🔥 You will become CROREPATI!";
    } else {
        goalText.innerText = "Keep investing...";
    }

    // UPDATE GRAPH
    chart.data.labels = Array.from({length: t}, (_, i) => "Year " + (i+1));
    chart.data.datasets[0].data = yearlyData;
    chart.update();
}

calculate();

</script>

</body>
</html>
